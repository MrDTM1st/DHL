<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>DHL Haulage Desk</title>
  <!-- PWA: installable on a phone (Android: Chrome menu -> Add to Home screen;
       iPhone: Safari share -> Add to Home Screen) -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <meta name="theme-color" content="#ffcc00" />
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Haulage Desk" />
  <script>
    // Register the service worker (offline shell + installability). Never on
    // the vite dev server - a SW pinning dev assets makes HMR hell.
    if ('serviceWorker' in navigator && location.port !== '5173') {
      addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
